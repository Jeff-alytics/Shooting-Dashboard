name: Fetch Shooting Data

on:
  schedule:
    - cron: '0 10 * * *'   # 4:00 AM UTC
    - cron: '0 22 * * *'  # 4:00 PM UTC
  workflow_dispatch:          # Manual trigger from Actions tab

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install pdfjs-dist@3.11.174 playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-linux
          restore-keys: playwright-chromium-

      - name: Install Playwright Chromium + deps
        run: npx playwright install --with-deps chromium

      - name: Fetch shooting data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-shooting-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manual-auto.json
          timestamp=$(date -u +"%Y-%m-%d %H:%M")
          git diff --staged --quiet || git commit -m "Auto-update shooting data [$timestamp UTC]"
          git pull --rebase -X theirs origin main || true
          git add data/manual-auto.json
          git rebase --continue 2>/dev/null || true
          git push
